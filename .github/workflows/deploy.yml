name: Build and Deploy EasyPool to GCP

on:
  push:
    branches:
      - master
    paths:
      - 'services/**'
      - '.github/workflows/**'
  workflow_dispatch:
    inputs:
      force_deploy:
        description: 'Force deploy all services (bypasses path filter)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

env:
  PROJECT_ID: project-05588bf2-f685-4769-a37
  REGION: asia-south1
  REPO_NAME: easypool-repo
  REGISTRY: asia-south1-docker.pkg.dev
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# ── Path filters ──────────────────────────────────────────────────────────────
# Each build job only runs when its own service files change.
# This is the single biggest time saver: changing dashboard CSS
# no longer triggers a backend rebuild + migration run.

jobs:
  # ── Detect which services changed ─────────────────────────────────────────
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      dashboard: ${{ steps.filter.outputs.dashboard }}
      gateway: ${{ steps.filter.outputs.gateway }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'services/backend/**'
            dashboard:
              - 'services/dashboard/**'
            gateway:
              - 'services/gps-gateway/**'

  # ── Backend ───────────────────────────────────────────────────────────────
  build-backend:
    needs: changes
    if: needs.changes.outputs.backend == 'true' || inputs.force_deploy == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}
      - run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet
      - uses: docker/setup-buildx-action@v3
      - name: Sync OpenAPI Spec
        run: cp api/openapi.yaml services/backend/openapi.yaml
      - name: Build and Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./services/backend
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/backend:latest
          cache-from: type=gha,scope=backend
          cache-to: type=gha,scope=backend,mode=max

      - name: Build and Push PgBouncer
        uses: docker/build-push-action@v5
        with:
          context: ./services/backend/pgbouncer
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/pgbouncer:latest
          cache-from: type=gha,scope=pgbouncer
          cache-to: type=gha,scope=pgbouncer,mode=max

  run-migrations:
    needs: build-backend
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}
      - uses: google-github-actions/setup-gcloud@v2
      - name: Run Migrations
        run: |
          gcloud run jobs deploy backend-migrate \
            --image ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/backend:latest \
            --region ${{ env.REGION }} \
            --project ${{ env.PROJECT_ID }} \
            --command "python,manage.py,migrate" \
            --set-env-vars "BYPASS_PGBOUNCER=True,DB_NAME=bustrak,DB_USER=admin,DB_HOST=/cloudsql/${{ env.PROJECT_ID }}:${{ env.REGION }}:easypool-postgres,DB_PORT=5432,DB_ENGINE=django.contrib.gis.db.backends.postgis,DEBUG=False,DJANGO_SETTINGS_MODULE=config.settings,FIREBASE_PROJECT_ID=${{ secrets.FIREBASE_PROJECT_ID }}" \
            --set-secrets "SECRET_KEY=django-secret-key:latest,REDIS_URL=redis-url:latest,DB_PASSWORD=db-password:latest" \
            --set-cloudsql-instances "${{ env.PROJECT_ID }}:${{ env.REGION }}:easypool-postgres" \
            --vpc-connector "projects/${{ env.PROJECT_ID }}/locations/${{ env.REGION }}/connectors/easypool-vpcc-v2" \
            --service-account "easypool-backend-sa@${{ env.PROJECT_ID }}.iam.gserviceaccount.com" \
            --quiet
          gcloud run jobs execute backend-migrate \
            --region ${{ env.REGION }} \
            --project ${{ env.PROJECT_ID }} \
            --wait

  deploy-backend:
    needs: run-migrations
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}
      - uses: google-github-actions/setup-gcloud@v2
      - name: Deploy Backend to Cloud Run
        run: |
          # Deploy Multi-Container Service
          gcloud run deploy easypool-backend \
            --container backend \
              --image ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/backend:latest \
              --port 8000 \
              --set-env-vars "DB_NAME=bustrak,DB_USER=admin,DB_HOST=127.0.0.1,DB_PORT=6432,DB_ENGINE=django.contrib.gis.db.backends.postgis,DEBUG=False,DJANGO_SETTINGS_MODULE=config.settings,FIREBASE_PROJECT_ID=${{ secrets.FIREBASE_PROJECT_ID }}" \
              --set-secrets "SECRET_KEY=django-secret-key:latest,REDIS_URL=redis-url:latest,DB_PASSWORD=db-password:latest" \
            --container pgbouncer \
              --image ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/pgbouncer:latest \
              --port 6432 \
              --set-env-vars "DB_PASSWORD_DUMMY=placeholder" \
              --set-secrets "DB_PASSWORD=db-password:latest" \
            --region ${{ env.REGION }} \
            --project ${{ env.PROJECT_ID }} \
            --add-cloudsql-instances "${{ env.PROJECT_ID }}:${{ env.REGION }}:easypool-postgres" \
            --vpc-connector "projects/${{ env.PROJECT_ID }}/locations/${{ env.REGION }}/connectors/easypool-vpcc-v2" \
            --service-account "easypool-backend-sa@${{ env.PROJECT_ID }}.iam.gserviceaccount.com" \
            --cpu-boost \
            --quiet

  # ── Dashboard ─────────────────────────────────────────────────────────────
  build-dashboard:
    needs: changes
    if: needs.changes.outputs.dashboard == 'true' || inputs.force_deploy == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}
      - run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: services/dashboard/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: services/dashboard
      - name: Run Typecheck
        run: npm run typecheck
        working-directory: services/dashboard
      - uses: docker/setup-buildx-action@v3
      - name: Build and Push Dashboard
        uses: docker/build-push-action@v5
        with:
          context: ./services/dashboard
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/dashboard:latest
          build-args: |
            BACKEND_API_URL=https://easypool-backend-222076803846.asia-south1.run.app
            NEXT_PUBLIC_API_URL=https://easypool-backend-222076803846.asia-south1.run.app
            NEXT_PUBLIC_GOOGLE_MAPS_API_KEY=${{ secrets.GOOGLE_MAPS_API_KEY }}
            NEXT_PUBLIC_GOOGLE_MAPS_MAP_ID=${{ secrets.GOOGLE_MAPS_MAP_ID }}
            NEXT_PUBLIC_FIREBASE_API_KEY=${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
            NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
            NEXT_PUBLIC_FIREBASE_PROJECT_ID=${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
            NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}
            NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
            NEXT_PUBLIC_FIREBASE_APP_ID=${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}
            NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID=${{ secrets.NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID }}
          cache-from: type=gha,scope=dashboard
          cache-to: type=gha,scope=dashboard,mode=max

  deploy-dashboard:
    needs: build-dashboard
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}
      - uses: google-github-actions/setup-gcloud@v2
      - name: Deploy Dashboard to Cloud Run
        run: |
          gcloud run deploy easypool-dashboard-schools \
            --image ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/dashboard:latest \
            --region ${{ env.REGION }} \
            --project ${{ env.PROJECT_ID }} \
            --set-env-vars "BACKEND_API_URL=https://easypool-backend-222076803846.asia-south1.run.app,NEXT_PUBLIC_API_URL=https://easypool-backend-222076803846.asia-south1.run.app,NEXT_PUBLIC_FIREBASE_API_KEY=${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }},NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }},NEXT_PUBLIC_FIREBASE_PROJECT_ID=${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }},NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }},NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }},NEXT_PUBLIC_FIREBASE_APP_ID=${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }},NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID=${{ secrets.NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID }}" \
            --allow-unauthenticated \
            --cpu-boost \
            --quiet

  # ── GPS Gateway (VM) ──────────────────────────────────────────────────────
  build-gateway:
    needs: changes
    if: needs.changes.outputs.gateway == 'true' || inputs.force_deploy == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}
      - run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet
      - uses: docker/setup-buildx-action@v3
      - name: Sync OpenAPI Spec
        run: cp api/openapi.yaml services/gps-gateway/openapi.yaml
      - name: Build and Push Gateway
        uses: docker/build-push-action@v5
        with:
          context: ./services/gps-gateway
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/gps-gateway:latest
          cache-from: type=gha,scope=gateway
          cache-to: type=gha,scope=gateway,mode=max

  deploy-vm-gateway:
    needs: build-gateway
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}
      - uses: google-github-actions/setup-gcloud@v2
      - name: Update VM Gateway (Docker)
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/gps-gateway:latest"
          ACCESS_TOKEN=$(gcloud auth print-access-token)
          GPS_API_KEY="${{ secrets.GPS_SERVICE_API_KEY }}"

          gcloud compute ssh camera-relay-server \
            --zone ${{ env.REGION }}-a \
            --project ${{ env.PROJECT_ID }} \
            --tunnel-through-iap \
            --quiet \
            -- bash -s -- "${IMAGE}" "${ACCESS_TOKEN}" "${GPS_API_KEY}" <<'DEPLOY_SCRIPT'
          set -euo pipefail
          
          IMAGE=$1
          ACCESS_TOKEN=$2
          GPS_API_KEY=$3

          # ── Auth Docker to Artifact Registry ─────────────────────────────────
          export DOCKER_CONFIG=$(mktemp -d)
          trap "rm -rf ${DOCKER_CONFIG}" EXIT
          echo '{"auths":{}}' > ${DOCKER_CONFIG}/config.json
          echo "${ACCESS_TOKEN}" | docker login -u oauth2accesstoken --password-stdin \
            https://${{ env.REGISTRY }}

          echo "[CI] Pulling latest gateway image: ${IMAGE}"
          docker pull "${IMAGE}"

          # ── Stop any running gateway ──────────────────────────────────────────
          docker stop gps_gateway 2>/dev/null || true
          docker rm   gps_gateway 2>/dev/null || true

          # Kill any leftover bare-python processes (the old /tmp/gateway.py hack)
          pkill -f "python.*gateway.py" 2>/dev/null || true

          # ── Start gateway container ───────────────────────────────────────────
          docker run -d \
            --name gps_gateway \
            --restart always \
            --network host \
            -e BACKEND_API_URL=https://easypool-backend-222076803846.asia-south1.run.app/api/gps/ \
            -e GPS_SERVICE_API_KEY="${GPS_API_KEY}" \
            -e GATEWAY_PORT=5027 \
            "${IMAGE}"

          # ── Verify ───────────────────────────────────────────────────────────
          echo "[CI] Waiting for container health check..."
          MAX_RETRIES=12  # 12 * 5s = 60s
          RETRY_COUNT=0
          while [ ${RETRY_COUNT} -lt ${MAX_RETRIES} ]; do
            HEALTH_STATUS=$(docker inspect --format='{{.State.Health.Status}}' gps_gateway 2>/dev/null || echo "unhealthy")
            RUNNING_STATUS=$(docker inspect --format='{{.State.Status}}' gps_gateway 2>/dev/null || echo "not_found")
            
            echo "[CI] Attempt $((RETRY_COUNT+1)): Running=${RUNNING_STATUS}, Health=${HEALTH_STATUS}"
            
            if [ "${HEALTH_STATUS}" == "healthy" ]; then
              echo "[CI] ✅ GPS Gateway is healthy and listening."
              docker logs gps_gateway --tail=10
              exit 0
            fi
            
            if [ "${RUNNING_STATUS}" != "running" ]; then
              echo "[CI][ERROR] Container stopped unexpectedly. Logs:"
              docker logs gps_gateway --tail=50
              exit 1
            fi
            
            RETRY_COUNT=$((RETRY_COUNT+1))
            sleep 5
          done

          echo "[CI][ERROR] Health check timed out after 60s. Logs:"
          docker logs gps_gateway --tail=50
          exit 1
          DEPLOY_SCRIPT
