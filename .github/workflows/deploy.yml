name: Build and Deploy EasyPool to GCP

on:
  push:
    branches: [master]
    paths:
      - 'services/**'
      - '.github/workflows/**'
      - 'api/**'
  workflow_dispatch:
    inputs:
      deploy_target:
        description: 'Which service to deploy'
        required: true
        default: 'all'
        type: choice
        options: ['all', 'backend', 'dashboard', 'gateway']

env:
  PROJECT_ID: project-05588bf2-f685-4769-a37
  REGION: asia-south1
  REPO_NAME: easypool-repo
  REGISTRY: asia-south1-docker.pkg.dev

jobs:

  # ═══════════════════════════════════════════════════════════════════════════
  # BACKEND: Build → Migrate → Deploy
  # ═══════════════════════════════════════════════════════════════════════════

  build-backend:
    if: >-
      github.event_name == 'push' ||
      github.event.inputs.deploy_target == 'all' ||
      github.event.inputs.deploy_target == 'backend'
    runs-on: ubuntu-latest
    permissions: { contents: read, id-token: write }
    outputs:
      image: ${{ steps.build.outputs.imageid }}
      sha: ${{ steps.sha.outputs.sha }}
    steps:
      - uses: actions/checkout@v4
      - id: sha
        run: echo "sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}
      - run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet
      - uses: docker/setup-buildx-action@v3
      - id: build
        uses: docker/build-push-action@v5
        with:
          context: ./services/backend
          push: true
          # Tag with both :latest AND :<sha> — service.yaml uses sha tag so
          # Cloud Run always sees a new image reference → always creates a new revision
          tags: |
            ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/backend:latest
            ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/backend:${{ steps.sha.outputs.sha }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,scope=backend,mode=max
      - uses: docker/build-push-action@v5
        with:
          context: ./services/backend/pgbouncer
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/pgbouncer:latest
            ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/pgbouncer:${{ steps.sha.outputs.sha }}
          cache-from: type=gha,scope=pgbouncer
          cache-to: type=gha,scope=pgbouncer,mode=max

  run-migrations:
    needs: build-backend
    runs-on: ubuntu-latest
    permissions: { contents: read, id-token: write }
    steps:
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}
      - uses: google-github-actions/setup-gcloud@v2
      - name: Deploy and Run Migrations
        run: |
          SHA=${{ needs.build-backend.outputs.sha }}
          gcloud run jobs deploy backend-migrate \
            --image ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/backend:${SHA} \
            --region ${{ env.REGION }} \
            --project ${{ env.PROJECT_ID }} \
            --service-account "easypool-backend-sa@${{ env.PROJECT_ID }}.iam.gserviceaccount.com" \
            --set-cloudsql-instances "${{ env.PROJECT_ID }}:${{ env.REGION }}:easypool-postgres" \
            --vpc-connector "projects/${{ env.PROJECT_ID }}/locations/${{ env.REGION }}/connectors/easypool-vpcc-v2" \
            --vpc-egress private-ranges-only \
            --set-env-vars "DB_NAME=bustrak,DB_USER=admin,DB_HOST=/cloudsql/${{ env.PROJECT_ID }}:${{ env.REGION }}:easypool-postgres,DB_PORT=5432,DB_ENGINE=django.contrib.gis.db.backends.postgis,BYPASS_PGBOUNCER=True,DJANGO_SETTINGS_MODULE=config.settings" \
            --set-secrets "DB_PASSWORD=db-password:latest" \
            --quiet
          gcloud run jobs execute backend-migrate \
            --region ${{ env.REGION }} \
            --project ${{ env.PROJECT_ID }} \
            --wait

  deploy-backend:
    needs: [build-backend, run-migrations]
    runs-on: ubuntu-latest
    permissions: { contents: read, id-token: write }
    steps:
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}
      - uses: google-github-actions/setup-gcloud@v2
      - name: Deploy Backend to Cloud Run
        run: |
          SHA=${{ needs.build-backend.outputs.sha }}
          # Use SHA tag (not :latest) so Cloud Run always sees a new image
          # reference and is forced to create a new revision on every deploy.
          cat > /tmp/service.yaml <<EOF
          apiVersion: serving.knative.dev/v1
          kind: Service
          metadata:
            name: easypool-backend
            annotations:
              run.googleapis.com/ingress: all
          spec:
            template:
              metadata:
                annotations:
                  run.googleapis.com/cloudsql-instances: project-05588bf2-f685-4769-a37:asia-south1:easypool-postgres
                  run.googleapis.com/vpc-access-connector: projects/project-05588bf2-f685-4769-a37/locations/asia-south1/connectors/easypool-vpcc-v2
                  run.googleapis.com/vpc-access-egress: private-ranges-only
                  run.googleapis.com/startup-cpu-boost: "true"
                  autoscaling.knative.dev/maxScale: "10"
              spec:
                serviceAccountName: easypool-backend-sa@project-05588bf2-f685-4769-a37.iam.gserviceaccount.com
                containerConcurrency: 80
                timeoutSeconds: 300
                containers:
                - name: backend
                  image: asia-south1-docker.pkg.dev/project-05588bf2-f685-4769-a37/easypool-repo/backend:${SHA}
                  ports:
                  - containerPort: 8080
                  resources:
                    limits:
                      cpu: "1"
                      memory: 1024Mi
                  startupProbe:
                    failureThreshold: 10
                    periodSeconds: 30
                    tcpSocket:
                      port: 8080
                    timeoutSeconds: 20
                  env:
                  - name: DB_NAME
                    value: bustrak
                  - name: DB_USER
                    value: admin
                  - name: DB_HOST
                    value: "127.0.0.1"
                  - name: DB_PORT
                    value: "6432"
                  - name: DB_ENGINE
                    value: django.contrib.gis.db.backends.postgis
                  - name: DB_CONN_MAX_AGE
                    value: "0"
                  - name: DEBUG
                    value: "False"
                  - name: DJANGO_SETTINGS_MODULE
                    value: config.settings
                  - name: FIREBASE_PROJECT_ID
                    value: project-05588bf2-f685-4769-a37
                  - name: SECRET_KEY
                    valueFrom:
                      secretKeyRef:
                        name: django-secret-key
                        key: latest
                  - name: REDIS_URL
                    valueFrom:
                      secretKeyRef:
                        name: redis-url
                        key: latest
                  - name: DB_PASSWORD
                    valueFrom:
                      secretKeyRef:
                        name: db-password
                        key: latest
                - name: pgbouncer
                  image: asia-south1-docker.pkg.dev/project-05588bf2-f685-4769-a37/easypool-repo/pgbouncer:${SHA}
                  resources:
                    limits:
                      cpu: "0.5"
                      memory: 256Mi
                  env:
                  - name: DB_PASSWORD
                    valueFrom:
                      secretKeyRef:
                        name: db-password
                        key: latest
          EOF
          gcloud run services replace /tmp/service.yaml \
            --region ${{ env.REGION }} \
            --project ${{ env.PROJECT_ID }} \
            --quiet

  # ═══════════════════════════════════════════════════════════════════════════
  # DASHBOARD: Build → Deploy
  # ═══════════════════════════════════════════════════════════════════════════

  build-dashboard:
    if: >-
      github.event_name == 'push' ||
      github.event.inputs.deploy_target == 'all' ||
      github.event.inputs.deploy_target == 'dashboard'
    runs-on: ubuntu-latest
    permissions: { contents: read, id-token: write }
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}
      - run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: services/dashboard/package-lock.json
      - run: npm ci
        working-directory: services/dashboard
      - run: npm run typecheck
        working-directory: services/dashboard
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v5
        with:
          context: ./services/dashboard
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/dashboard:latest
          build-args: |
            BACKEND_API_URL=https://easypool-backend-ihsu77lpaa-el.a.run.app
            NEXT_PUBLIC_API_URL=https://easypool-backend-ihsu77lpaa-el.a.run.app
            NEXT_PUBLIC_GOOGLE_MAPS_API_KEY=${{ secrets.GOOGLE_MAPS_API_KEY }}
            NEXT_PUBLIC_GOOGLE_MAPS_MAP_ID=${{ secrets.GOOGLE_MAPS_MAP_ID }}
            NEXT_PUBLIC_FIREBASE_API_KEY=${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
            NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
            NEXT_PUBLIC_FIREBASE_PROJECT_ID=${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
            NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}
            NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
            NEXT_PUBLIC_FIREBASE_APP_ID=${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}
            NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID=${{ secrets.NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID }}
          cache-from: type=gha,scope=dashboard
          cache-to: type=gha,scope=dashboard,mode=max

  deploy-dashboard:
    needs: build-dashboard
    runs-on: ubuntu-latest
    permissions: { contents: read, id-token: write }
    steps:
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}
      - uses: google-github-actions/setup-gcloud@v2
      - name: Deploy Dashboard
        run: |
          gcloud run deploy easypool-dashboard-schools \
            --image ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/dashboard:latest \
            --region ${{ env.REGION }} \
            --project ${{ env.PROJECT_ID }} \
            --set-env-vars "BACKEND_API_URL=https://easypool-backend-ihsu77lpaa-el.a.run.app,NEXT_PUBLIC_API_URL=https://easypool-backend-ihsu77lpaa-el.a.run.app,NEXT_PUBLIC_FIREBASE_API_KEY=${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }},NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }},NEXT_PUBLIC_FIREBASE_PROJECT_ID=${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }},NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }},NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }},NEXT_PUBLIC_FIREBASE_APP_ID=${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }},NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID=${{ secrets.NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID }}" \
            --allow-unauthenticated \
            --cpu-boost \
            --quiet

  # ═══════════════════════════════════════════════════════════════════════════
  # GATEWAY: Build → Deploy to VM
  # ═══════════════════════════════════════════════════════════════════════════

  build-gateway:
    if: >-
      github.event_name == 'push' ||
      github.event.inputs.deploy_target == 'all' ||
      github.event.inputs.deploy_target == 'gateway'
    runs-on: ubuntu-latest
    permissions: { contents: read, id-token: write }
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}
      - run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet
      - uses: docker/setup-buildx-action@v3
      - run: cp api/openapi.yaml services/gps-gateway/openapi.yaml
      - uses: docker/build-push-action@v5
        with:
          context: ./services/gps-gateway
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/gps-gateway:latest
          cache-from: type=gha,scope=gateway
          cache-to: type=gha,scope=gateway,mode=max

  deploy-gateway:
    needs: build-gateway
    runs-on: ubuntu-latest
    permissions: { contents: read, id-token: write }
    steps:
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}
      - uses: google-github-actions/setup-gcloud@v2
      - name: Deploy to VM
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/gps-gateway:latest"
          ACCESS_TOKEN=$(gcloud auth print-access-token)
          GPS_API_KEY="${{ secrets.GPS_SERVICE_API_KEY }}"
          gcloud compute ssh camera-relay-server \
            --zone ${{ env.REGION }}-a \
            --project ${{ env.PROJECT_ID }} \
            --tunnel-through-iap --quiet \
            -- bash -s -- "${IMAGE}" "${ACCESS_TOKEN}" "${GPS_API_KEY}" <<'DEPLOY_SCRIPT'
          set -euo pipefail
          IMAGE=$1; ACCESS_TOKEN=$2; GPS_API_KEY=$3
          export DOCKER_CONFIG=$(mktemp -d)
          trap "rm -rf ${DOCKER_CONFIG}" EXIT
          echo '{"auths":{}}' > ${DOCKER_CONFIG}/config.json
          echo "${ACCESS_TOKEN}" | docker login -u oauth2accesstoken --password-stdin https://asia-south1-docker.pkg.dev
          docker pull "${IMAGE}"
          docker stop gps_gateway 2>/dev/null || true
          docker rm   gps_gateway 2>/dev/null || true
          docker run -d --name gps_gateway --restart always --network host \
            -e BACKEND_API_URL=https://easypool-backend-ihsu77lpaa-el.a.run.app/api/gps/ \
            -e GPS_SERVICE_API_KEY="${GPS_API_KEY}" \
            -e GATEWAY_PORT=5027 "${IMAGE}"
          echo "✅ Gateway deployed"
          DEPLOY_SCRIPT
