name: Build and Deploy EasyPool to GCP

on:
  push:
    branches:
      - master
    paths:
      - 'services/**'
      - '.github/workflows/**'

env:
  PROJECT_ID: project-05588bf2-f685-4769-a37
  REGION: asia-south1
  REPO_NAME: easypool-repo
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-backend:
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: '${{ secrets.WIF_PROVIDER }}'
          service_account: '${{ secrets.WIF_SERVICE_ACCOUNT }}'
      - name: Configure Docker Auth
        run: gcloud auth configure-docker ${REGION}-docker.pkg.dev
      - uses: docker/setup-buildx-action@v3
      - name: Build and Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./services/backend
          push: true
          tags: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-dashboard:
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: '${{ secrets.WIF_PROVIDER }}'
          service_account: '${{ secrets.WIF_SERVICE_ACCOUNT }}'
      - name: Configure Docker Auth
        run: gcloud auth configure-docker ${REGION}-docker.pkg.dev
      - uses: docker/setup-buildx-action@v3
      - name: Build and Push Dashboard
        uses: docker/build-push-action@v5
        with:
          context: ./services/dashboard
          push: true
          tags: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/dashboard:latest
          build-args: |
            BACKEND_API_URL=https://easypool-backend-222076803846.asia-south1.run.app
            NEXT_PUBLIC_API_URL=https://easypool-backend-222076803846.asia-south1.run.app
            NEXT_PUBLIC_GOOGLE_MAPS_API_KEY=${{ secrets.GOOGLE_MAPS_API_KEY }}
            NEXT_PUBLIC_GOOGLE_MAPS_MAP_ID=${{ secrets.GOOGLE_MAPS_MAP_ID }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-gateway:
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: '${{ secrets.WIF_PROVIDER }}'
          service_account: '${{ secrets.WIF_SERVICE_ACCOUNT }}'
      - name: Configure Docker Auth
        run: gcloud auth configure-docker ${REGION}-docker.pkg.dev
      - uses: docker/setup-buildx-action@v3
      - name: Build and Push Gateway
        uses: docker/build-push-action@v5
        with:
          context: ./services/gps-mqtt
          push: true
          tags: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/gps-mqtt:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  run-migrations:
    needs: build-backend
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'
    steps:
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: '${{ secrets.WIF_PROVIDER }}'
          service_account: '${{ secrets.WIF_SERVICE_ACCOUNT }}'
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
      - name: Execute Migration Job
        run: |
          gcloud run jobs deploy backend-migrate \
            --image ${REGION}-docker.pkg.dev/${PROJECT_ID}/${REPO_NAME}/backend:latest \
            --region ${REGION} \
            --project ${PROJECT_ID} \
            --command "python,manage.py,migrate" \
            --set-env-vars "DB_NAME=bustrak,DB_USER=admin,DB_PASSWORD=adminpassword,DB_HOST=/cloudsql/project-05588bf2-f685-4769-a37:asia-south1:easypool-postgres,DEBUG=False,DJANGO_SETTINGS_MODULE=config.settings" \
            --set-cloudsql-instances "project-05588bf2-f685-4769-a37:asia-south1:easypool-postgres" \
            --quiet
          gcloud run jobs execute backend-migrate \
            --region ${REGION} \
            --project ${PROJECT_ID} \
            --wait

  deploy-backend:
    needs: run-migrations
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'
    steps:
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: '${{ secrets.WIF_PROVIDER }}'
          service_account: '${{ secrets.WIF_SERVICE_ACCOUNT }}'
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
      - name: Deploy Backend to Cloud Run
        run: |
          gcloud run deploy easypool-backend \
            --image ${REGION}-docker.pkg.dev/${PROJECT_ID}/${REPO_NAME}/backend:latest \
            --region ${REGION} \
            --project ${PROJECT_ID} \
            --cpu-boost \
            --quiet

  deploy-dashboard:
    needs: build-dashboard
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'
    steps:
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: '${{ secrets.WIF_PROVIDER }}'
          service_account: '${{ secrets.WIF_SERVICE_ACCOUNT }}'
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
      - name: Deploy Dashboard to Cloud Run
        run: |
          gcloud run deploy easypool-dashboard-schools \
            --image ${REGION}-docker.pkg.dev/${PROJECT_ID}/${REPO_NAME}/dashboard:latest \
            --region ${REGION} \
            --project ${PROJECT_ID} \
            --set-env-vars "BACKEND_API_URL=https://easypool-backend-222076803846.asia-south1.run.app,NEXT_PUBLIC_API_URL=https://easypool-backend-222076803846.asia-south1.run.app" \
            --allow-unauthenticated \
            --cpu-boost \
            --quiet

  deploy-vm-gateway:
    needs: build-gateway
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'
    steps:
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: '${{ secrets.WIF_PROVIDER }}'
          service_account: '${{ secrets.WIF_SERVICE_ACCOUNT }}'
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
      - name: Update VM Gateway
        run: |
          gcloud compute ssh camera-relay-server \
            --zone asia-south1-a \
            --project ${PROJECT_ID} \
            --tunnel-through-iap \
            --quiet \
            --command "
            gcloud auth configure-docker ${REGION}-docker.pkg.dev --quiet
            docker pull ${REGION}-docker.pkg.dev/${PROJECT_ID}/${REPO_NAME}/gps-mqtt:latest
            docker stop gps_gateway gps-mqtt || true
            docker rm gps_gateway gps-mqtt || true
            docker run -d --name gps_gateway \
              --restart always \
              -e MQTT_BROKER=localhost \
              -e MQTT_USER='${{ secrets.MQTT_USER }}' \
              -e MQTT_PASSWORD='${{ secrets.MQTT_PASSWORD }}' \
              -e BACKEND_API_URL=https://easypool-backend-222076803846.asia-south1.run.app/api/gps/telemetry \
              -e GPS_SERVICE_API_KEY='${{ secrets.GPS_SERVICE_API_KEY }}' \
              --network host \
              ${REGION}-docker.pkg.dev/${PROJECT_ID}/${REPO_NAME}/gps-mqtt:latest
          "
