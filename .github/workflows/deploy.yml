name: Build and Deploy EasyPool to GCP

on:
  push:
    branches:
      - master
    paths:
      - 'services/**'
      - '.github/workflows/**'

env:
  PROJECT_ID: project-05588bf2-f685-4769-a37
  REGION: asia-south1
  REPO_NAME: easypool-repo

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Authenticate to Google Cloud
      uses: google-github-actions/auth@v2
      with:
        workload_identity_provider: '${{ secrets.WIF_PROVIDER }}'
        service_account: '${{ secrets.WIF_SERVICE_ACCOUNT }}'

    - name: Set up Cloud SDK
      uses: google-github-actions/setup-gcloud@v2

    - name: Configure Docker Auth
      run: |
        gcloud auth configure-docker ${REGION}-docker.pkg.dev

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build and Push Backend Image
      uses: docker/build-push-action@v5
      with:
        context: ./services/backend
        push: true
        tags: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/backend:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Build and Push Dashboard Image
      uses: docker/build-push-action@v5
      with:
        context: ./services/dashboard
        push: true
        tags: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/dashboard:latest
        build-args: |
          BACKEND_API_URL=https://easypool-backend-222076803846.asia-south1.run.app
          NEXT_PUBLIC_API_URL=https://easypool-backend-222076803846.asia-south1.run.app
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Build and Push GPS-MQTT Image
      uses: docker/build-push-action@v5
      with:
        context: ./services/gps-mqtt
        push: true
        tags: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/gps-mqtt:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Update Backend Cloud Run Service
      run: |
        gcloud run deploy easypool-backend \
          --image ${REGION}-docker.pkg.dev/${PROJECT_ID}/${REPO_NAME}/backend:latest \
          --region ${REGION} \
          --project ${PROJECT_ID} \
          --quiet

    - name: Update Dashboard Cloud Run Service
      run: |
        gcloud run deploy easypool-dashboard-schools \
          --image ${REGION}-docker.pkg.dev/${PROJECT_ID}/${REPO_NAME}/dashboard:latest \
          --region ${REGION} \
          --project ${PROJECT_ID} \
          --set-env-vars "BACKEND_API_URL=https://easypool-backend-222076803846.asia-south1.run.app,NEXT_PUBLIC_API_URL=https://easypool-backend-222076803846.asia-south1.run.app" \
          --allow-unauthenticated \
          --quiet

    - name: Deploy GPS-MQTT to VM
      run: |
        gcloud compute ssh camera-relay-server \
          --zone asia-south1-a \
          --project ${PROJECT_ID} \
          --tunnel-through-iap \
          --quiet \
          --command "
          gcloud auth configure-docker ${REGION}-docker.pkg.dev --quiet
          docker pull ${REGION}-docker.pkg.dev/${PROJECT_ID}/${REPO_NAME}/gps-mqtt:latest
          docker stop gps-mqtt || true
          docker rm gps-mqtt || true
          docker run -d --name gps-mqtt \
            --restart always \
            -e MQTT_BROKER=localhost \
            -e MQTT_USER=${{ secrets.MQTT_USER }} \
            -e MQTT_PASSWORD=${{ secrets.MQTT_PASSWORD }} \
            -e BACKEND_API_URL=https://easypool-backend-222076803846.asia-south1.run.app/api/gps/telemetry \
            -e GPS_SERVICE_API_KEY=${{ secrets.GPS_SERVICE_API_KEY }} \
            --network host \
            ${REGION}-docker.pkg.dev/${PROJECT_ID}/${REPO_NAME}/gps-mqtt:latest
        "
