[databases]
* = host=/cloudsql/project-05588bf2-f685-4769-a37:asia-south1:easypool-postgres port=5432 user=admin

[pgbouncer]
listen_port = 6432
listen_addr = 0.0.0.0
auth_type = md5
auth_file = /etc/pgbouncer/userlist.txt
pool_mode = transaction
max_client_conn = 1000
default_pool_size = 20
max_db_connections = 50
admin_users = admin
stats_users = admin
ignore_startup_parameters = extra_float_digits
