openapi: 3.0.3
info:
  title: School Bus Safety API
  version: 1.0.0
  description: Universal API for school bus tracking, attendance, and video monitoring.
paths:
  /api/alerts:
    get:
      operationId: alerts_list
      description: |-
        Mixin to filter querysets by the user's school.
        Superadmins can see everything.
      parameters:
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      tags:
      - alerts
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedAlertList'
          description: ''
    post:
      operationId: alerts_create
      description: |-
        Mixin to filter querysets by the user's school.
        Superadmins can see everything.
      tags:
      - alerts
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Alert'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Alert'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Alert'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Alert'
          description: ''
  /api/alerts/{id}/:
    get:
      operationId: alerts_retrieve
      description: |-
        Mixin to filter querysets by the user's school.
        Superadmins can see everything.
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this alert.
        required: true
      tags:
      - alerts
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Alert'
          description: ''
    put:
