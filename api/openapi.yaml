        Mixin to filter querysets by the user's school.
        Superadmins can see everything.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this gps point.
        required: true
      tags:
      - gps
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GPSPoint'
          description: ''
  /api/gps/telemetry/:
    post:
      operationId: gps_telemetry_create
      description: Update GPS point for a bus (called by TCP gateway).
      parameters:
      - in: header
        name: X-API-KEY
        schema:
          type: string
        required: true
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                imei: {type: string}
                lat: {type: number}
                lng: {type: number}
                speed: {type: number}
                heading: {type: number}
                ignition: {type: boolean}
                timestamp: {type: number}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: {type: string}
          description: ''
  /api/gps/bulk_telemetry/:
    post:
      operationId: gps_bulk_telemetry_create
      description: Batch update for GPS points (called by smarter Gateway).
      parameters:
      - in: header
        name: X-API-KEY
        schema:
          type: string
        required: true
      requestBody:
        content:
          application/json:
            schema:
              type: array
              items:
                type: object
                properties:
                  imei: {type: string}
                  coords: {type: array, items: {type: number}, minItems: 2, maxItems: 2}
                  speed: {type: number}
                  heading: {type: number}
                  ignition: {type: boolean}
                  timestamp: {type: number}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: {type: string}
                  count: {type: integer}
          description: ''
  /api/gps/timeline:
    get:
      operationId: gps_timeline
      description: Return cumulative KM series per bus, computed in PostGIS.
      parameters:
      - name: start
        in: query
        schema: {type: string, format: date}
      - name: end
        in: query
        schema: {type: string, format: date}
      - name: bus
        in: query
        schema: {type: string}
      tags:
      - gps
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    bus_id: {type: string, format: uuid}
                    internal_id: {type: string}
                    series:
                      type: array
                      items:
                        type: object
                        properties:
                          timestamp: {type: string, format: date-time}
                          cumulative_km: {type: number}
          description: ''
