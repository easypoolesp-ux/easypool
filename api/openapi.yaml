components:
  schemas:
    Alert:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        bus:
          allOf:
          - $ref: '#/components/schemas/BusList'
          readOnly: true
        type:
          $ref: '#/components/schemas/AlertTypeEnum'
        message:
          type: string
        is_resolved:
          type: boolean
        created_at:
          type: string
          format: date-time
          readOnly: true
        resolved_by:
          type: string
          format: uuid
          nullable: true
      required:
      - bus
      - created_at
      - id
      - message
      - type
    AlertTypeEnum:
      enum:
      - sos
      - overspeed
      - off_route
      - camera_offline
      - student_missing
      type: string
      description: |-
        * `sos` - SOS
        * `overspeed` - Overspeed
        * `off_route` - Off Route
        * `camera_offline` - Camera Offline
        * `student_missing` - Student Missing
    BusDetail:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        route:
          allOf:
          - $ref: '#/components/schemas/Route'
          readOnly: true
        school:
          allOf:
          - $ref: '#/components/schemas/School'
          readOnly: true
        internal_id:
          type: string
          maxLength: 50
        plate_number:
          type: string
          maxLength: 50
        status:
          $ref: '#/components/schemas/StatusEnum'
        camera_count:
          type: integer
          maximum: 2147483647
          minimum: -2147483648
        router_ip:
          type: string
          nullable: true
        driver_name:
          type: string
          maxLength: 200
        driver_phone:
          type: string
          maxLength: 20
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
        transporter:
          type: string
          format: uuid
          nullable: true
      required:
      - created_at
      - id
      - internal_id
      - plate_number
      - route
      - school
      - updated_at
    BusList:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        internal_id:
          type: string
          maxLength: 50
        plate_number:
          type: string
          maxLength: 50
        status:
          $ref: '#/components/schemas/StatusEnum'
        lat:
          type: number
          format: double
          readOnly: true
        lng:
          type: number
          format: double
          readOnly: true
        route_name:
          type: string
          readOnly: true
        driver_name:
          type: string
          maxLength: 200
      required:
      - id
      - internal_id
      - lat
      - lng
      - plate_number
      - route_name
    GPSPoint:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        lat:
          type: number
          format: double
        lng:
          type: number
          format: double
        speed:
          type: number
          format: double
        heading:
          type: number
          format: double
        accuracy:
          type: number
          format: double
          nullable: true
        timestamp:
          type: string
          format: date-time
        bus:
          type: string
          format: uuid
      required:
      - bus
      - id
      - lat
      - lng
      - timestamp
    PaginatedAlertList:
      type: object
      properties:
        count:
          type: integer
          example: 123
        next:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?page=4
        previous:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?page=2
        results:
          type: array
          items:
            $ref: '#/components/schemas/Alert'
    PaginatedBusListList:
      type: object
      properties:
        count:
          type: integer
          example: 123
        next:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?page=4
        previous:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?page=2
        results:
          type: array
          items:
            $ref: '#/components/schemas/BusList'
    PaginatedGPSPointList:
