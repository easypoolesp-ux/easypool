            application/json:
              schema:
                $ref: '#/components/schemas/TokenRefresh'
          description: ''
  /api/buses:
    get:
      operationId: buses_list
      description: |-
        Mixin to filter querysets by the user's school.
        Superadmins can see everything.
      parameters:
      - in: query
        name: internal_id
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - in: query
        name: route
        schema:
          type: string
          format: uuid
      - in: query
        name: status
        schema:
          type: string
          enum:
          - idle
          - offline
          - online
        description: |-
          * `online` - Online
          * `offline` - Offline
          * `idle` - Idle
      - in: query
        name: transporter
        schema:
          type: string
          format: uuid
      tags:
      - buses
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedBusListList'
          description: ''
    post:
